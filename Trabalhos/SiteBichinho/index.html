<html>
    <head>
        <meta charset="UTF-8">
        <title>Meu Pet Virtual</title>
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>

<body class="bg-pink-50 min-h-screen flex flex-col" style="
    background-image: url('bg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin: 0;
">

<div class="w-full flex items-center justify-start p-4 gap-4 bg-white/30 backdrop-blur-sm">
        <div class="avatar">
            <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                <img src="b_n.png" alt="Avatar" />
            </div>
        </div>

        <input 
            type="text" 
            placeholder="Nome da criatura..." 
            class="input input-secondary w-full max-w-xs"
        />
    </div>

    <div class="flex flex-col items-center w-full px-4">
        <img 
            id="b" 
            src="b_n.png" 
            alt="Pet Virtual" 
            class="w-full max-w-md h-auto"
        />
    </div>

    <div class="mt-12 flex justify-center w-full">
        <img 
            id="btn" 
            src="btn.png" 
            alt="Botão Alimentar" 
            class="w-1/3 max-w-[180px] h-auto cursor-pointer active:scale-95 transition"
            onclick="alimentar()"
        />
    </div>

    <div id="botao_gostosinho" class="fixed bottom-4 right-4 z-50">
        <img
            id="btn_gostosinho"
            src="botao"
            alt="Botão Gostosinho"
            class="w-16 h-16 cursor-pointer hover:scale-110 transition active:rotate-12"
            onclick="revelarSegredo()"
        />
    </div>

    <script src="script.js"></script>
</body>
</html>
